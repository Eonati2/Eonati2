<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#0f2420"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1dbf73"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="greenV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1dbf73"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1500" fill="url(#bg)"/>

  <!-- Subtle glow circles -->
  <circle cx="900" cy="200" r="300" fill="rgba(29,191,115,0.06)"/>
  <circle cx="100" cy="1300" r="250" fill="rgba(29,191,115,0.04)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1000" height="8" fill="url(#green)"/>

  <!-- Brand mark -->
  <rect x="60" y="60" width="56" height="56" rx="14" fill="url(#greenV)"/>
  <text x="88" y="100" font-family="'Arial Black',Arial,sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">E</text>
  <text x="134" y="100" font-family="'Arial Black',Arial,sans-serif" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="-1">EONATI</text>

  <!-- Quiz badge -->
  <rect x="60" y="148" width="240" height="36" rx="18" fill="rgba(29,191,115,0.15)" stroke="#1dbf73" stroke-width="1.5"/>
  <text x="180" y="171" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#1dbf73" text-anchor="middle">&#x1F9E0; FREE 60-SECOND QUIZ</text>

  <!-- Main headline -->
  <text x="60" y="290" font-family="'Arial Black',Arial,sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">Which Logo</text>
  <text x="60" y="375" font-family="'Arial Black',Arial,sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">Designer Is</text>
  <text x="60" y="460" font-family="'Arial Black',Arial,sans-serif" font-size="72" font-weight="900" fill="url(#green)" letter-spacing="-2">Right for</text>
  <text x="60" y="545" font-family="'Arial Black',Arial,sans-serif" font-size="72" font-weight="900" fill="url(#green)" letter-spacing="-2">Your Brand?</text>

  <!-- Sub headline -->
  <text x="60" y="610" font-family="Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.6)" letter-spacing="-0.5">Answer 5 questions. Get your match.</text>
  <text x="60" y="644" font-family="Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.6)" letter-spacing="-0.5">No account needed. Free.</text>

  <!-- Divider -->
  <rect x="60" y="680" width="80" height="4" rx="2" fill="url(#green)"/>

  <!-- Designer cards -->
  <!-- Juhi -->
  <rect x="60" y="720" width="880" height="130" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(29,191,115,0.3)" stroke-width="1.5"/>
  <rect x="60" y="720" width="6" height="130" rx="3" fill="url(#greenV)"/>
  <circle cx="116" cy="785" r="30" fill="rgba(29,191,115,0.2)" stroke="#1dbf73" stroke-width="1.5"/>
  <text x="116" y="792" font-family="'Arial Black',Arial,sans-serif" font-size="20" font-weight="900" fill="#1dbf73" text-anchor="middle">J</text>
  <text x="165" y="763" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">STARTUPS · SAAS · TECH</text>
  <text x="165" y="793" font-family="'Arial Black',Arial,sans-serif" font-size="22" font-weight="900" fill="#ffffff">Juhi (Explorance Studio)</text>
  <text x="165" y="820" font-family="Arial,sans-serif" font-size="16" fill="#1dbf73">&#x2605;4.8 &amp;nbsp;·&amp;nbsp; 9,319 reviews &amp;nbsp;·&amp;nbsp; From €23</text>
  <rect x="820" y="742" width="100" height="36" rx="18" fill="rgba(29,191,115,0.15)" stroke="#1dbf73" stroke-width="1"/>
  <text x="870" y="765" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#1dbf73" text-anchor="middle">From €23</text>

  <!-- Alestra -->
  <rect x="60" y="870" width="880" height="130" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(30,58,138,0.5)" stroke-width="1.5"/>
  <rect x="60" y="870" width="6" height="130" rx="3" fill="#1e40af"/>
  <circle cx="116" cy="935" r="30" fill="rgba(30,64,175,0.3)" stroke="#1e40af" stroke-width="1.5"/>
  <text x="116" y="942" font-family="'Arial Black',Arial,sans-serif" font-size="20" font-weight="900" fill="#60a5fa" text-anchor="middle">A</text>
  <text x="165" y="913" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">CORPORATE · ENTERPRISE · AGENCY</text>
  <text x="165" y="943" font-family="'Arial Black',Arial,sans-serif" font-size="22" font-weight="900" fill="#ffffff">Alestra Agency</text>
  <text x="165" y="970" font-family="Arial,sans-serif" font-size="16" fill="#60a5fa">&#x2605;4.9 &amp;nbsp;·&amp;nbsp; 31,034 reviews &amp;nbsp;·&amp;nbsp; From €112</text>
  <rect x="820" y="892" width="100" height="36" rx="18" fill="rgba(30,64,175,0.2)" stroke="#1e40af" stroke-width="1"/>
  <text x="870" y="915" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#60a5fa" text-anchor="middle">From €112</text>

  <!-- Valeriia -->
  <rect x="60" y="1020" width="880" height="130" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(201,162,39,0.4)" stroke-width="1.5"/>
  <rect x="60" y="1020" width="6" height="130" rx="3" fill="#c9a227"/>
  <circle cx="116" cy="1085" r="30" fill="rgba(201,162,39,0.2)" stroke="#c9a227" stroke-width="1.5"/>
  <text x="116" y="1092" font-family="'Arial Black',Arial,sans-serif" font-size="20" font-weight="900" fill="#f59e0b" text-anchor="middle">V</text>
  <text x="165" y="1063" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">LUXURY · FASHION · BEAUTY</text>
  <text x="165" y="1093" font-family="'Arial Black',Arial,sans-serif" font-size="22" font-weight="900" fill="#ffffff">Valeriia T</text>
  <text x="165" y="1120" font-family="Arial,sans-serif" font-size="16" fill="#f59e0b">&#x2605;4.8 &amp;nbsp;·&amp;nbsp; 8,045 reviews &amp;nbsp;·&amp;nbsp; From €175</text>
  <rect x="820" y="1042" width="100" height="36" rx="18" fill="rgba(201,162,39,0.15)" stroke="#c9a227" stroke-width="1"/>
  <text x="870" y="1065" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">From €175</text>

  <!-- Trust bar -->
  <rect x="60" y="1190" width="880" height="90" rx="16" fill="rgba(29,191,115,0.08)" stroke="rgba(29,191,115,0.2)" stroke-width="1.5"/>
  <text x="500" y="1225" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="0.06em">48,398 VERIFIED REVIEWS ACROSS ALL 3 DESIGNERS</text>
  <text x="500" y="1255" font-family="'Arial Black',Arial,sans-serif" font-size="20" font-weight="900" fill="#1dbf73" text-anchor="middle">Top 1% Vetted · Escrow Protected · From €23</text>

  <!-- CTA arrow block -->
  <rect x="60" y="1320" width="880" height="100" rx="16" fill="url(#greenV)"/>
  <text x="500" y="1360" font-family="'Arial Black',Arial,sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle">Take the Free Quiz →</text>
  <text x="500" y="1393" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">eonati2.github.io/Eonati2</text>

  <!-- Bottom domain -->
  <text x="500" y="1462" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="middle">Save this pin · Find your perfect logo designer</text>
</svg>
